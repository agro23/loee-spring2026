<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOEE Spring 2026 — Student Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 48px 24px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #8b949e; font-size: 16px; margin-bottom: 48px; }
        .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .project {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-decoration: none;
            color: #e6edf3;
            transition: border-color 0.2s;
        }
        .project:hover { border-color: #58a6ff; }
        .project .name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .project .desc { color: #8b949e; font-size: 13px; }
        .empty { color: #8b949e; font-style: italic; }
        .section-label { color: #8b949e; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
        .materials { margin-bottom: 48px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>League of Extraordinary Engineers</h1>
        <p class="subtitle">Spring 2026 — PDX Hacks — Student Projects</p>
        <div class="materials">
            <div class="section-label">Class materials</div>
            <div class="projects">
                <a class="project" href="class-2/">
                    <div class="name">Class 2 — Build Three Apps</div>
                    <div class="desc">Student handout with prompts & setup steps</div>
                </a>
            </div>
        </div>
        <div class="section-label">Student projects</div>
        <div class="projects">
            <!-- Add student projects here as they're collected -->
            <!-- Example:
            <a class="project" href="students/jane/">
                <div class="name">Jane</div>
                <div class="desc">Photography portfolio</div>
            </a>
            -->
        </div>
        <p class="empty">Projects will appear here during class.</p>
    </div>
</body>
</html>
